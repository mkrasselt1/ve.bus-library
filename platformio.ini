; PlatformIO project configuration for the VEBus library + basic_ess example.
;
; Board: LilyGo T-CAN485 (ESP32 Dev Module, 4 MB flash)
; This file lives at the library root so you can open the folder directly
; in VS Code / PlatformIO IDE and hit Build/Upload right away.
;
; lib_extra_dirs = .   →  PlatformIO finds the VEBus library here at the root
; src_dir           →  the example sketch to compile

[platformio]
src_dir = examples/basic_ess

[env:lilygo-t-can485]
platform  = espressif32
board     = esp32dev
framework = arduino

; RS485 on T-CAN485 runs at 256 kbaud — use a fast monitor speed too
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

; Tell PlatformIO that the library lives right here in the repo root
lib_extra_dirs = .

; Optional: limit partition scheme to fit large sketches
board_build.partitions = min_spiffs.csv
