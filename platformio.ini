; PlatformIO project configuration for the VEBus library + basic_ess example.
;
; Board: LilyGo T-CAN485 (ESP32 Dev Module, 4 MB flash)
; This file lives at the library root so you can open the folder directly
; in VS Code / PlatformIO IDE and hit Build/Upload right away.
;
; lib_extra_dirs = .   →  PlatformIO finds the VEBus library here at the root
; src_dir           →  the example sketch to compile

[platformio]
default_envs = basic_ess

; Shared settings for all examples
[env]
platform  = espressif32
board     = esp32dev
framework = arduino
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
lib_extra_dirs  = .
board_build.partitions = min_spiffs.csv

; --- Basic ESS: serial console control, no WiFi ---
[env:basic_ess]
build_src_filter = -<*> +<../examples/basic_ess/>

; --- MQTT → Home Assistant auto-discovery ---
[env:mqtt_ha]
build_src_filter = -<*> +<../examples/mqtt_ha/>
lib_deps =
    knolleary/PubSubClient@^2.8

; --- Raw RS485 test (hardware debugging) ---
[env:raw_test]
build_src_filter = -<*> +<../examples/raw_test/>
